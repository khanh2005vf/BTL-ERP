<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#4C6EF5"/>
      <stop offset="1" stop-color="#06D6A0"/>
    </linearGradient>
    <style>
      .title { font: 700 40px 'Arial'; fill: white; }
      .subtitle { font: 400 22px 'Arial'; fill: white; opacity:0.9 }
      .badge { font: 600 14px 'Arial'; fill: white }
    </style>
  </defs>
  <rect width="100%" height="100%" rx="16" fill="url(#g)" />
  <g transform="translate(40,60)">
    <text x="0" y="0" class="title">Hệ thống Quản lý Nhân Sự, Công Việc & CRM</text>
    <text x="0" y="50" class="subtitle">Nền tảng Odoo — Tập trung, tự động hóa và dễ sử dụng</text>
    <rect x="0" y="80" width="480" height="2" fill="rgba(255,255,255,0.25)" />
    <text x="0" y="130" class="badge">• Quản lý Nhân Sự</text>
    <text x="200" y="130" class="badge">• Quản lý Công Việc</text>
    <text x="430" y="130" class="badge">• CRM & Bán hàng</text>
  </g>
  <g transform="translate(680,220)" opacity="0.12">
    <rect x="0" y="0" width="220" height="120" rx="8" fill="#fff" />
  </g>
</svg>
